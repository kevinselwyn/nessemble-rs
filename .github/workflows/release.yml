name: Release

# The release version is the workspace version in the root Cargo.toml
# (`[workspace.package] version`) — the same version the CLI reports. There is
# no manual version input. On every push to main (or a manual run), the pipeline
# reads that version and, if a `v<version>` tag does not already exist, builds
# every platform artifact and publishes a tagged GitHub Release for it. Bumping
# the workspace version is therefore all it takes to cut a release.
#
# Artifacts:
#   macOS          nessemble_<v>.pkg  nessemble_<v>_macos.tar.gz
#   Linux amd64    nessemble_<v>_amd64.deb
#   Linux i386     nessemble_<v>_i386.deb
#   Windows 32-bit nessemble_<v>_win32.exe  nessemble_<v>_win32.msi
#   Windows 64-bit nessemble_<v>_win64.exe  nessemble_<v>_win64.msi
#   WebAssembly    nessemble_<v>_wasm.tar.gz  (the in-browser assembler bundle)
#
# The macOS .pkg is unsigned, so Gatekeeper blocks it after download; the plain
# binary tarball is provided as a signing-free alternative (see the release
# notes / installation docs for the one-time `xattr` step).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------- Resolve version / tag state
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      exists: ${{ steps.resolve.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        run: |
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # A pre-release version (anything with a `-<suffix>`, e.g. 2.5.0-dev) is
          # work-in-progress and is never released; `exists=true` gates every
          # build/release job below off. Drop the suffix to cut the release.
          if [[ "$version" == *-* ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Workspace version **$version** is a pre-release; skipping release." >> "$GITHUB_STEP_SUMMARY"
          elif git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Workspace version **$version** — tag \`v$version\` already exists; nothing to release." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Workspace version **$version** — no \`v$version\` tag yet; cutting a release." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------- Linux .deb
  linux:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - target: i686-unknown-linux-gnu
            deb_arch: i386
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (i386)
        if: matrix.deb_arch == 'i386'
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build .deb
        run: |
          cargo deb -p nessemble-cli --target ${{ matrix.target }} --output \
            "nessemble_${{ needs.version.outputs.version }}_${{ matrix.deb_arch }}.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: "*.deb"

  # ------------------------------------------------------------- Windows .exe/.msi
  windows:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            win: win64
          - target: i686-pc-windows-msvc
            win: win32
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-wix
        run: cargo install cargo-wix
      - name: Build binary
        run: cargo build --release -p nessemble-cli --target ${{ matrix.target }}
      - name: Stage .exe
        shell: bash
        run: cp "target/${{ matrix.target }}/release/nessemble.exe" "nessemble_${{ needs.version.outputs.version }}_${{ matrix.win }}.exe"
      - name: Build .msi
        run: |
          cargo wix init --force -p nessemble-cli
          cargo wix -p nessemble-cli --target ${{ matrix.target }} --nocapture --output "nessemble_${{ needs.version.outputs.version }}_${{ matrix.win }}.msi"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.win }}
          path: |
            nessemble_*.exe
            nessemble_*.msi

  # --------------------------------------------------------------- macOS .pkg
  macos:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Build binary
        run: cargo build --release -p nessemble-cli --target x86_64-apple-darwin
      - name: Build .pkg
        run: |
          mkdir -p payload/usr/local/bin
          cp target/x86_64-apple-darwin/release/nessemble payload/usr/local/bin/nessemble
          pkgbuild --root payload --identifier com.nessemble.cli \
            --version "${{ needs.version.outputs.version }}" --install-location / \
            "nessemble_${{ needs.version.outputs.version }}.pkg"
      - name: Build plain binary tarball
        # An unsigned/unnotarized .pkg is blocked by Gatekeeper when downloaded;
        # ship the raw binary too, so users can install it without the .pkg (see
        # the release notes / installation docs for the one-time xattr step).
        run: |
          tar -czf "nessemble_${{ needs.version.outputs.version }}_macos.tar.gz" \
            -C target/x86_64-apple-darwin/release nessemble
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            *.pkg
            *.tar.gz

  # --------------------------------------------------------------- WASM bundle
  #
  # The browser build of the assembler: the `nessemble-wasm` glue + `.wasm`, the
  # `<nessemble-assembler>` Web Component (JS + CSS), and a short usage README,
  # packaged as a tarball so the interactive assembler can be dropped into any
  # site without building it.
  wasm:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        # Must match the wasm-bindgen version in Cargo.lock, or the generated
        # bindings are rejected with a schema-version mismatch.
        run: cargo install wasm-bindgen-cli --version 0.2.126
      - name: Build wasm bundle
        run: cargo run -p xtask -- wasm
      - name: Package
        run: |
          v="${{ needs.version.outputs.version }}"
          dir="nessemble-wasm-$v"
          mkdir -p "$dir"
          cp crates/nessemble-wasm/pkg/nessemble.js crates/nessemble-wasm/pkg/nessemble_bg.wasm "$dir/"
          cp web/nessemble-assembler.js web/nessemble-assembler.css "$dir/"
          cat > "$dir/README.md" <<'README'
          # nessemble — in-browser assembler

          A WebAssembly build of the nessemble 6502/NES assembler plus the
          `<nessemble-assembler>` Web Component.

          ## Use

          Serve these files over HTTP (the component `import()`s the wasm glue and
          `fetch()`es the `.wasm`, which browsers block on `file://`), then:

          ```html
          <link rel="stylesheet" href="nessemble-assembler.css">
          <script src="nessemble-assembler.js"></script>

          <nessemble-assembler>
            lda #$00
            nop
          </nessemble-assembler>
          ```

          The element assembles its source in the browser and shows a hex dump
          with a download link. Options (iNES output, custom pseudo-op scripts)
          go in a `data-opts` JSON attribute; see the documentation.
          README
          tar -czf "nessemble_${v}_wasm.tar.gz" "$dir"
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: "*.tar.gz"

  # ----------------------------------------------------------------- Release
  #
  # Creates the `v<version>` tag (at this commit) and its GitHub Release,
  # uploads all artifacts, and auto-generates release notes listing every
  # pull request merged since the previous release (GitHub's "What's Changed"
  # changelog; grouping is configured in .github/release.yml).
  release:
    needs: [version, linux, windows, macos, wasm]
    if: needs.version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create tagged release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: nessemble v${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            `nessemble` — a 6502 assembler for the Nintendo Entertainment System.

            ### Downloads

            | Platform       | Artifact(s)                                |
            |----------------|--------------------------------------------|
            | macOS          | `nessemble_*.pkg`, `nessemble_*_macos.tar.gz` |
            | Linux amd64    | `nessemble_*_amd64.deb`                    |
            | Linux i386     | `nessemble_*_i386.deb`                     |
            | Windows 32-bit | `nessemble_*_win32.exe`, `…_win32.msi`     |
            | Windows 64-bit | `nessemble_*_win64.exe`, `…_win64.msi`     |
            | WebAssembly    | `nessemble_*_wasm.tar.gz` (in-browser assembler) |

            #### macOS: "Apple could not verify…" on the `.pkg`

            The `.pkg` is not signed with an Apple Developer ID, so macOS
            Gatekeeper blocks it after download. Either clear the quarantine flag
            and install the `.pkg` normally:

            ```sh
            xattr -d com.apple.quarantine nessemble_*.pkg
            sudo installer -pkg nessemble_*.pkg -target /
            ```

            …or skip the installer entirely and use the plain binary tarball:

            ```sh
            tar -xzf nessemble_*_macos.tar.gz
            xattr -d com.apple.quarantine nessemble        # clear quarantine
            sudo mv nessemble /usr/local/bin/               # onto your PATH
            ```
          files: |
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.pkg
            artifacts/**/*.tar.gz
