name: Release

# Produces the same artifacts as the upstream v1.1.1 release, for all five
# targets, and attaches them to the GitHub Release for the pushed tag:
#
#   macOS          nessemble_<v>.pkg
#   Linux amd64    nessemble_<v>_amd64.deb
#   Linux i386     nessemble_<v>_i386.deb
#   Windows 32-bit nessemble_<v>_win32.exe  nessemble_<v>_win32.msi
#   Windows 64-bit nessemble_<v>_win64.exe  nessemble_<v>_win64.msi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v), e.g. 1.1.1"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------- Linux .deb
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            deb_arch: amd64
          - target: i686-unknown-linux-gnu
            deb_arch: i386
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (i386)
        if: matrix.deb_arch == 'i386'
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Determine version
        id: v
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build .deb
        run: |
          cargo deb -p nessemble-cli --target ${{ matrix.target }} --output \
            "nessemble_${{ steps.v.outputs.version }}_${{ matrix.deb_arch }}.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: "*.deb"

  # ------------------------------------------------------------- Windows .exe/.msi
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            win: win64
          - target: i686-pc-windows-msvc
            win: win32
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-wix
        run: cargo install cargo-wix
      - name: Determine version
        id: v
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build binary
        run: cargo build --release -p nessemble-cli --target ${{ matrix.target }}
      - name: Stage .exe
        shell: bash
        run: cp "target/${{ matrix.target }}/release/nessemble.exe" "nessemble_${{ steps.v.outputs.version }}_${{ matrix.win }}.exe"
      - name: Build .msi
        run: |
          cargo wix init --force -p nessemble-cli
          cargo wix -p nessemble-cli --target ${{ matrix.target }} --nocapture --output "nessemble_${{ steps.v.outputs.version }}_${{ matrix.win }}.msi"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.win }}
          path: |
            nessemble_*.exe
            nessemble_*.msi

  # --------------------------------------------------------------- macOS .pkg
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Determine version
        id: v
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build binary
        run: cargo build --release -p nessemble-cli --target x86_64-apple-darwin
      - name: Build .pkg
        run: |
          mkdir -p payload/usr/local/bin
          cp target/x86_64-apple-darwin/release/nessemble payload/usr/local/bin/nessemble
          pkgbuild --root payload --identifier com.nessemble.cli \
            --version "${{ steps.v.outputs.version }}" --install-location / \
            "nessemble_${{ steps.v.outputs.version }}.pkg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: "*.pkg"

  # ----------------------------------------------------------------- Release
  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
