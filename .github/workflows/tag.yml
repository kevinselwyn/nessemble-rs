name: Tag Release

# The tagging process. Run this manually to cut a release: it validates the
# version, checks the tag does not already exist, and creates + pushes an
# annotated `v<version>` tag. Pushing the tag triggers the Release workflow,
# which builds every platform artifact and publishes a GitHub Release with
# auto-generated notes listing the pull requests included.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.1.0)"
        required: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          version="${{ inputs.version }}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$'; then
            echo "::error::'$version' is not a valid semver-like version"
            exit 1
          fi

      - name: Check workspace version matches
        run: |
          crate_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          if [ "$crate_version" != "${{ inputs.version }}" ]; then
            echo "::error::Cargo.toml workspace version ($crate_version) does not match the requested version (${{ inputs.version }}). Bump the workspace version on main first."
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Summary
        run: |
          echo "Pushed tag **v${{ inputs.version }}** — the Release workflow will build the artifacts and publish the GitHub Release." >> "$GITHUB_STEP_SUMMARY"
