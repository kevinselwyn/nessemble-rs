name: Pages

# Build the marketing website + mdBook documentation and deploy to GitHub Pages.
#
# Deploys only when a GitHub Release is published (by the Publish pipeline in
# release.yml) — not on every push to main. Pushing docs to Pages on each merge
# would let the published site drift ahead of the last released code; tying it
# to the release keeps the docs in lockstep with the version users can install.
# Use the manual `workflow_dispatch` trigger to re-deploy the current release's
# site out of band.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        run: cargo install mdbook --version "^0.4"
      - name: Install wasm-bindgen-cli
        # Must match the `wasm-bindgen` version in Cargo.lock, or the generated
        # bindings are rejected with a schema-version mismatch.
        run: cargo install wasm-bindgen-cli --version 0.2.126
      - name: Build site (website + docs + wasm assembler)
        run: cargo run -p xtask -- dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
