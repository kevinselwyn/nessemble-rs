name: Release

# Changeset-driven release trigger (run manually: Actions → Release → Run
# workflow). Computes the next semantic version from the changesets accumulated
# in `.changeset/` since the last release, bumps the whole workspace — the root
# `[workspace.package] version`, every inherited crate, the internal
# `[workspace.dependencies]` pins, and `Cargo.lock` (via `cargo set-version`) —
# writes `CHANGELOG.md`, consumes the changesets, and pushes the result to
# `main` as the `nessemble-release[bot]` GitHub App. That push triggers the
# build & publish pipeline (Publish / release.yml).
#
# If there are no release-impacting changesets, `xtask changeset version` exits
# non-zero and the run stops before any commit — nothing to release.
#
# Requires the App's credentials as repo secrets (RELEASE_APP_ID,
# RELEASE_APP_PRIVATE_KEY) and the App on `main`'s branch-protection bypass
# list. See ref/repo/release-app-setup.md and plans/004-release-orchestration.md.

on:
  workflow_dispatch:

# Never let two release runs bump the version concurrently.
concurrency: release-version

# The push is authenticated by the App token, not GITHUB_TOKEN.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Mint a GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Resolve the bot commit identity
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug='${{ steps.app-token.outputs.app-slug }}'
          user_id="$(gh api "/users/${slug}[bot]" --jq .id)"
          echo "name=${slug}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${slug}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          # Check out (and later push) as the App, so the push both bypasses
          # branch protection and triggers the Publish pipeline.
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Show pending changesets
        run: cargo run -p xtask -- changeset status

      - name: Apply the release (bump + changelog + consume changesets)
        run: cargo run -p xtask -- changeset version

      - name: Commit & push to main
        env:
          GIT_AUTHOR_NAME: ${{ steps.bot.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.bot.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.bot.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.bot.outputs.email }}
        run: |
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          git add -A
          git commit -m "Release ${version}"
          git push origin HEAD:main
          echo "Pushed **Release ${version}** to \`main\`; the Publish pipeline will build and tag it." >> "$GITHUB_STEP_SUMMARY"
