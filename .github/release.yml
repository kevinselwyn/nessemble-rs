# Configures GitHub's automatically-generated release notes (the "What's
# Changed" pull-request changelog) used by the Release workflow.

changelog:
  categories:
    - title: Features
      labels: ["enhancement", "feature"]
    - title: Bug Fixes
      labels: ["bug", "fix"]
    - title: Documentation
      labels: ["documentation", "docs"]
    - title: Other Changes
      labels: ["*"]
